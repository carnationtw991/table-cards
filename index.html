<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>立體三角桌牌產生器 | 鄭念慈老師設計</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 終極修復：加入現代瀏覽器原生 Import Map 解決 react/jsx-runtime 等模組路徑解析問題 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>
</head>
<body class="bg-sky-50">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    // 使用標準 bare imports，由 head 的 importmap 自動對照解析
    import React, { useState, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Type, Users, Download, FileText, Image as ImageIcon, Palette, Upload, CheckCircle2, AlertCircle, Loader2, FileDown, ImagePlus, Heart, Star, Circle, Sparkles, Cloud, Trash2, X } from 'lucide-react';

    const THEMES = {
      blue: { id: 'blue', name: '水藍', bg: 'bg-[#f0fdfa]', bgHex: '#f0fdfa', text: 'text-[#082f49]', textHex: '#082f49', border: 'border-[#38bdf8]', borderHex: '#38bdf8', accent: 'bg-[#e0f2fe]', accentHex: '#e0f2fe', iconColor: 'text-[#bae6fd]' },
      pink: { id: 'pink', name: '粉色', bg: 'bg-[#fdf2f8]', bgHex: '#fdf2f8', text: 'text-[#831843]', textHex: '#831843', border: 'border-[#f472b6]', borderHex: '#f472b6', accent: 'bg-[#fce7f3]', accentHex: '#fce7f3', iconColor: 'text-[#fbcfe8]' },
      school: { id: 'school', name: '開學', bg: 'bg-[#fffbeb]', bgHex: '#fffbeb', text: 'text-[#713f12]', textHex: '#713f12', border: 'border-[#facc15]', borderHex: '#facc15', accent: 'bg-[#fef08a]', accentHex: '#fef08a', iconColor: 'text-[#fde047]' },
      bw: { id: 'bw', name: '黑白', bg: 'bg-[#ffffff]', bgHex: '#ffffff', text: 'text-[#000000]', textHex: '#000000', border: 'border-[#1f2937]', borderHex: '#1f2937', accent: 'bg-[#f3f4f6]', accentHex: '#f3f4f6', iconColor: 'text-[#e5e7eb]' },
    };

    const FONTS = { sans: { id: 'sans', name: '預設' }, kai: { id: 'kai', name: '標楷體' }, wanghan: { id: 'wanghan', name: '注音體' } };

    // --- 共用組件：桌牌模板 (修正絕對置中邏輯) ---
    const NameTentTemplate = React.memo(({ person, config, id }) => {
      const theme = THEMES[config.theme];
      const baseNameSize = person.name ? (person.name.length <= 2 ? 105 : person.name.length === 3 ? 85 : person.name.length === 4 ? 65 : 55) : 105;
      const nameSize = `${baseNameSize * ((config.nameScale || 100) / 100)}px`;
      const displayName = (person.name && person.name.length === 2) ? person.name.split('').join('　') : (person.name || '姓名');

      const QuarterContent = ({ isRotated }) => {
        let nameFontFamily = config.font === 'wanghan' ? "'王漢宗中楷體注音', 'HanWangKaiMediumChuIn', 'Bopomofo', serif" : config.font === 'kai' ? "'BiauKai', '標楷體', 'DFKai-SB', serif" : "'Noto Sans TC', 'Microsoft JhengHei', sans-serif";
        const IconSvg = () => config.theme === 'pink' ? <Heart width="90" height="90" fill="currentColor" /> : config.theme === 'blue' ? <Cloud width="95" height="95" fill="currentColor" /> : config.theme === 'school' ? <Star width="90" height="90" fill="currentColor" /> : <Circle width="90" height="90" fill="currentColor" />;

        return (
          <div style={{ position: 'absolute', top: 0, left: 0, width: '794px', height: '280.75px', backgroundColor: (config.showBg && !config.bgImage) ? theme.bgHex : '#ffffff', backgroundImage: config.bgImage ? `url(${config.bgImage})` : 'none', backgroundSize: '100% 100%', backgroundPosition: 'center', transform: isRotated ? 'rotate(180deg)' : 'none', transformOrigin: 'center', boxSizing: 'border-box', overflow: 'hidden', fontFamily: 'sans-serif' }}>
            {config.showIcon && !config.bgImage && <><div style={{ position: 'absolute', top: '95px', left: '80px', opacity: 0.35, zIndex: 1 }} className={theme.iconColor}><IconSvg /></div><div style={{ position: 'absolute', top: '95px', right: '80px', opacity: 0.35, zIndex: 1 }} className={theme.iconColor}><IconSvg /></div></>}
            {config.showBorder && <div style={{ position: 'absolute', top: '12px', left: '12px', width: '770px', height: '256.75px', border: `4px solid ${theme.borderHex}`, borderRadius: '24px', boxSizing: 'border-box', pointerEvents: 'none', zIndex: 5 }}></div>}
            {config.logo && <div style={{ position: 'absolute', top: '24px', left: '32px', width: '64px', height: '64px', zIndex: 10 }}><img src={config.logo} alt="Logo" style={{ width: '100%', height: '100%', objectFit: 'contain' }} /></div>}
            {person.number && <div style={{ position: 'absolute', top: '20px', right: '32px', fontSize: '38px', fontWeight: '900', padding: '6px 24px', borderRadius: '999px', border: `4px solid ${theme.borderHex}`, backgroundColor: 'rgba(255,255,255,0.95)', color: theme.textHex, zIndex: 10, boxShadow: `0 6px 0 ${theme.borderHex}40`, fontFamily: 'system-ui, sans-serif' }}>{person.number}</div>}
            
            {/* 絕對置中容器，移除一切位移，強制行高為 1 確保對齊精準 */}
            <div style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 10, pointerEvents: 'none' }}>
              <div style={{ fontSize: nameSize, fontWeight: 'bold', lineHeight: '1', color: theme.textHex, fontFamily: nameFontFamily, whiteSpace: 'nowrap', textAlign: 'center' }}>{displayName}</div>
            </div>
          </div>
        );
      };

      return (
        <div id={id} className="bg-white shadow-sm" style={{ width: '794px', height: '1123px', position: 'relative', boxSizing: 'border-box', overflow: 'hidden' }}>
          <div style={{ position: 'absolute', top: 0, left: 0, width: '794px', height: '280.75px', backgroundColor: '#ffffff' }}><div style={{ position: 'absolute', bottom: '10px', left: '16px', color: '#cbd5e1', fontSize: '14px', fontWeight: 'bold' }}>☁️ 黏貼底座區</div></div>
          <div style={{ position: 'absolute', top: '280.75px', left: 0, width: '794px', height: '280.75px', backgroundColor: '#ffffff' }}><QuarterContent isRotated={true} /></div>
          <div style={{ position: 'absolute', top: '561.5px', left: 0, width: '794px', height: '280.75px', backgroundColor: '#ffffff' }}><QuarterContent isRotated={false} /></div>
          <div style={{ position: 'absolute', top: '842.25px', left: 0, width: '794px', height: '280.75px', backgroundColor: '#ffffff' }}><div style={{ position: 'absolute', top: '10px', right: '16px', color: '#cbd5e1', fontSize: '14px', fontWeight: 'bold' }}>黏貼底座區 ☁️</div></div>
          <div style={{ position: 'absolute', top: '280.75px', left: 0, width: '100%', borderBottom: '2px dashed #e2e8f0', zIndex: 60 }}></div>
          <div style={{ position: 'absolute', top: '561.5px', left: 0, width: '100%', borderBottom: '3px dashed #94a3b8', zIndex: 60 }}></div>
          <div style={{ position: 'absolute', top: '842.25px', left: 0, width: '100%', borderBottom: '2px dashed #e2e8f0', zIndex: 60 }}></div>
        </div>
      );
    });

    function App() {
      const [isAppReady, setIsAppReady] = useState(false);
      const [mode, setMode] = useState('single'); 
      const [singleData, setSingleData] = useState({ name: '王小明', number: '01' });
      const [batchText, setBatchText] = useState('');
      const [batchList, setBatchList] = useState([]);
      const [activePreviewIndex, setActivePreviewIndex] = useState(0);
      const [config, setConfig] = useState({ theme: 'blue', font: 'sans', showBorder: true, showBg: true, showIcon: true, logo: null, bgImage: null, nameScale: 100 });
      const [isExporting, setIsExporting] = useState(false);
      const [notification, setNotification] = useState(null);
      const previewWrapperRef = useRef(null);
      const isDragging = useRef(false);
      const [leftWidth, setLeftWidth] = useState(70); 
      const [previewScale, setPreviewScale] = useState(0.5);
      const [libsLoaded, setLibsLoaded] = useState(false);

      useEffect(() => { const timer = setTimeout(() => setIsAppReady(true), 500); return () => clearTimeout(timer); }, []);

      useEffect(() => {
        if (!isAppReady) return;
        const loadScript = (src) => new Promise((res, rej) => {
          if (document.querySelector(`script[src="${src}"]`)) return res();
          const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej; document.body.appendChild(s);
        });
        Promise.all([
          loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'),
          loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'),
          loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js')
        ]).then(() => setLibsLoaded(true)).catch(() => showNotification("引擎載入失敗", "error"));
      }, [isAppReady]);

      useEffect(() => {
        if (!isAppReady) return;
        const updateScale = () => {
          if (previewWrapperRef.current) {
            const { clientWidth, clientHeight } = previewWrapperRef.current;
            setPreviewScale(Math.min(Math.max(0, clientWidth - 40) / 794, Math.max(0, clientHeight - 40) / 1123));
          }
        };
        const resizeObserver = new ResizeObserver(updateScale);
        if (previewWrapperRef.current) resizeObserver.observe(previewWrapperRef.current);
        updateScale(); return () => resizeObserver.disconnect();
      }, [leftWidth, isAppReady]);

      useEffect(() => {
        const lines = batchText.split('\n').map(l => l.trim()).filter(l => l);
        const filteredList = lines.map((n, i) => ({ id: i, name: n, number: (i+1).toString().padStart(2, '0') })).filter(p => p.name !== '空' && p.name !== '空號');
        setBatchList(filteredList);
        if (activePreviewIndex >= filteredList.length && filteredList.length > 0) setActivePreviewIndex(filteredList.length - 1);
      }, [batchText]);

      const startDrag = (e) => { e.preventDefault(); isDragging.current = true; document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; document.addEventListener('mousemove', onDrag); document.addEventListener('mouseup', stopDrag); };
      const onDrag = (e) => { if (!isDragging.current) return; let nw = (e.clientX / window.innerWidth) * 100; if (nw > 30 && nw < 80) setLeftWidth(nw); };
      const stopDrag = () => { isDragging.current = false; document.body.style.cursor = 'default'; document.body.style.userSelect = 'auto'; document.removeEventListener('mousemove', onDrag); document.removeEventListener('mouseup', stopDrag); };
      const showNotification = (msg, type = 'success') => { setNotification({ msg, type }); setTimeout(() => setNotification(null), 3500); };
      
      const handleFileUpload = (e, configKey) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 5 * 1024 * 1024) { showNotification(`圖片不可超過 5MB`, 'error'); e.target.value = ''; return; }
          const reader = new FileReader(); reader.onload = (event) => { setConfig(p => ({ ...p, [configKey]: event.target.result })); showNotification(`上傳成功！`); }; reader.readAsDataURL(file);
        } e.target.value = '';
      };

      const generateCanvas = async (elementId) => {
        const el = document.getElementById(elementId); if (!el || !window.html2canvas) return null;
        return await window.html2canvas(el, { scale: 2, useCORS: true, logging: false, backgroundColor: '#ffffff' });
      };

      const exportSinglePDF = async () => {
        if (!libsLoaded || !singleData.name.trim()) return showNotification('請輸入姓名', 'error');
        setIsExporting(true);
        try {
          const canvas = await generateCanvas('export-single');
          const pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
          pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 210, 297);
          pdf.save(`${singleData.name}_桌牌.pdf`); showNotification('PDF 匯出成功！');
        } catch (err) { showNotification('匯出失敗', 'error'); } finally { setIsExporting(false); }
      };

      const exportBatchPDF = async () => {
        if (!libsLoaded || batchList.length === 0) return showNotification('名單是空的', 'error');
        setIsExporting(true);
        try {
          const pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
          for (let i = 0; i < batchList.length; i++) {
            if (i > 0) pdf.addPage();
            const canvas = await generateCanvas(`batch-item-${batchList[i].id}`);
            pdf.addImage(canvas.toDataURL('image/jpeg', 0.85), 'JPEG', 0, 0, 210, 297);
          }
          pdf.save(`批次桌牌_${batchList.length}份.pdf`); showNotification('批次下載成功');
        } catch (e) { showNotification('批次匯出失敗', 'error'); } finally { setIsExporting(false); }
      };

      const exportBatchZIP = async () => {
        if (!libsLoaded || batchList.length === 0) return showNotification('名單是空的', 'error');
        setIsExporting(true);
        try {
          const zip = new window.JSZip();
          for(let i=0; i<batchList.length; i++) {
            const canvas = await generateCanvas(`batch-item-${batchList[i].id}`);
            zip.file(`${i+1}_${batchList[i].name}.png`, canvas.toDataURL().split(',')[1], {base64: true});
          }
          const blob = await zip.generateAsync({type: 'blob'});
          const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = '桌牌批次圖片包.zip'; link.click(); showNotification('ZIP 打包完成');
        } catch (e) { showNotification('打包失敗', 'error'); } finally { setIsExporting(false); }
      };

      if (!isAppReady) {
        return (
          <div className="flex h-screen w-full items-center justify-center bg-sky-50 font-sans text-blue-950">
            <div className="flex flex-col items-center gap-5 animate-pulse"><Loader2 className="w-14 h-14 text-sky-500 animate-spin" /><div className="text-center"><h2 className="text-2xl font-black tracking-widest text-blue-900 mb-2">系統啟動中...</h2><p className="text-sm font-bold text-blue-600">正在準備安全的編輯環境 ☁️</p></div></div>
          </div>
        );
      }

      return (
        <div className="flex h-screen bg-sky-50/80 font-sans overflow-hidden text-blue-950">
          <style dangerouslySetInnerHTML={{__html: `
            @font-face { font-family: 'HanWangKaiMediumChuIn'; src: local('王漢宗中楷體注音'); }
            .font-wanghan { font-family: '王漢宗中楷體注音', serif !important; } .font-kai { font-family: '標楷體', serif !important; }
            @keyframes fade-in-up { 0% { opacity: 0; transform: translateY(15px); scale: 0.95; } 100% { opacity: 1; transform: translateY(0); scale: 1; } }
            .animate-fade-in-up { animation: fade-in-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
            .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; } .custom-scrollbar::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 20px; }
          `}} />

          {/* 左側控制面板 */}
          <div style={{ width: `${leftWidth}%` }} className="overflow-hidden bg-white/90 backdrop-blur-xl flex flex-col shadow-xl z-20 shrink-0 relative border-r border-sky-100">
            <div className="px-8 pt-10 pb-5 border-b-2 border-sky-50 bg-gradient-to-b from-sky-100/50 to-transparent flex items-center justify-between shrink-0 relative z-50">
              <div className="flex items-center gap-4">
                <div className="bg-sky-400 text-white p-3 rounded-[1rem] shadow-sm transform hover:scale-110 transition-all"><Sparkles className="w-6 h-6 fill-current" /></div>
                <div className="flex items-center gap-4">
                  <div><h1 className="text-[20px] font-black text-blue-950 tracking-wide leading-tight">立體三角桌牌產生器</h1><p className="text-[12px] text-blue-700 font-bold flex items-center gap-1"><Cloud className="w-3.5 h-3.5"/> 療癒 ‧ 簡單 ‧ 免費列印</p></div>
                  <div className="hidden lg:block"><div className="px-4 py-1.5 rounded-full bg-blue-50 border-2 border-blue-100 shadow-sm transition-all"><span className="text-[11px] text-blue-900 font-black">設計：鄭念慈老師</span></div></div>
                </div>
              </div>
              <div className="flex bg-sky-50/80 p-1.5 rounded-[1.2rem] border-2 border-sky-100 shadow-inner">
                <button onClick={() => setMode('single')} className={`px-5 py-2 rounded-xl font-bold text-[13px] transition-all ${mode === 'single' ? 'bg-sky-400 text-white shadow-md' : 'text-blue-700 hover:bg-sky-100/50'}`}>單筆製作</button>
                <button onClick={() => setMode('batch')} className={`px-5 py-2 rounded-xl font-bold text-[13px] transition-all ${mode === 'batch' ? 'bg-sky-400 text-white shadow-md' : 'text-blue-700 hover:bg-sky-100/50'}`}>大量匯入</button>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto px-8 pr-4 pb-8 pt-6 custom-scrollbar">
              <div className="grid grid-cols-1 xl:grid-cols-2 gap-x-12 gap-y-6">
                <section className="space-y-4">
                  <h2 className="text-sm font-extrabold text-blue-800 uppercase flex items-center gap-2 mb-2"><FileText className="w-5 h-5" /> 內容輸入區</h2>
                  {mode === 'single' ? (
                    <div className="bg-sky-50/60 p-5 rounded-[2rem] border-2 border-sky-100 shadow-sm">
                      <div className="grid grid-cols-[2.5fr_1fr] gap-4">
                        <div><label className="block text-[13px] font-bold text-blue-900 mb-1.5">姓名 <span className="text-pink-400">*</span></label><input type="text" value={singleData.name} onChange={e => setSingleData({...singleData, name: e.target.value})} className="w-full px-4 py-3 border-2 border-sky-200 rounded-2xl focus:ring-4 focus:ring-sky-100 outline-none font-bold text-blue-950 bg-white shadow-inner" placeholder="王小明" /></div>
                        <div><label className="block text-[13px] font-bold text-blue-900 mb-1.5 text-center">座號</label><input type="text" value={singleData.number} onChange={e => setSingleData({...singleData, number: e.target.value})} className="w-full px-4 py-3 border-2 border-sky-200 rounded-2xl focus:ring-4 focus:ring-sky-100 outline-none font-black text-blue-950 bg-white text-center shadow-inner" placeholder="01" /></div>
                      </div>
                    </div>
                  ) : (
                    <div className="space-y-4">
                       <div className="flex bg-sky-50 p-3 rounded-2xl border-2 border-sky-100 text-blue-900 font-bold text-[11px] leading-relaxed">💡 貼心提醒：每行輸入一個姓名。若該號碼無人使用，請輸入「空」或「空號」。</div>
                       <textarea value={batchText} onChange={e => setBatchText(e.target.value)} className="w-full h-48 px-5 py-4 border-2 border-sky-200 rounded-3xl focus:ring-4 focus:ring-sky-100 outline-none font-bold text-sm bg-white text-blue-950 shadow-inner" placeholder="每行輸入一個姓名...&#10;王小明&#10;空&#10;李大華" />
                       {batchList.length > 0 && <div className="bg-blue-50 p-3 rounded-2xl border border-blue-100 text-blue-900 font-black text-xs flex items-center gap-2"><CheckCircle2 className="w-4 h-4"/> 已載入 {batchList.length} 位人員</div>}
                    </div>
                  )}
                </section>

                <section className="space-y-4">
                  <h2 className="text-sm font-extrabold text-blue-800 uppercase flex items-center gap-2 mb-2"><Palette className="w-5 h-5" /> 佈景與裝飾</h2>
                  <div className="space-y-4">
                    <div className="flex gap-2 bg-sky-50 p-2 rounded-[1rem] border-2 border-sky-100 shadow-inner">
                      {Object.values(FONTS).map(f => (
                        <button key={f.id} onClick={() => setConfig({...config, font: f.id})} className={`flex-1 py-2.5 text-[13px] rounded-xl font-black transition-all ${config.font === f.id ? 'bg-white shadow-sm text-blue-950 scale-100' : 'text-blue-400 hover:text-blue-600'}`}>{f.name}</button>
                      ))}
                    </div>
                    <div className="flex items-center gap-4 bg-sky-50/80 p-3.5 rounded-[1rem] border-2 border-sky-100 shadow-inner">
                      <span className="text-[12px] font-black text-blue-900 shrink-0">姓名縮放</span>
                      <input type="range" min="50" max="200" value={config.nameScale || 100} onChange={e => setConfig({...config, nameScale: parseInt(e.target.value)})} className="flex-1 h-2 bg-sky-200 rounded-lg appearance-none cursor-pointer accent-sky-500" />
                      <span className="text-[13px] font-black text-blue-900 min-w-[40px] text-right">{config.nameScale}%</span>
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div className="bg-sky-50/80 p-3 rounded-[1.2rem] border-2 border-sky-100 flex justify-center items-center gap-4 shadow-inner">
                        <label className="flex items-center gap-2 cursor-pointer"><div className={`w-5 h-5 rounded-lg flex items-center justify-center transition-all ${config.showBorder ? 'bg-sky-400 text-white shadow-sm' : 'bg-sky-200'}`}>{config.showBorder && <CheckCircle2 className="w-3.5 h-3.5" />}</div><input type="checkbox" checked={config.showBorder} onChange={e => setConfig({...config, showBorder: e.target.checked})} className="hidden" /><span className="text-[13px] font-black text-blue-900">邊框</span></label>
                        <label className="flex items-center gap-2 cursor-pointer"><div className={`w-5 h-5 rounded-lg flex items-center justify-center transition-all ${config.showBg ? 'bg-sky-400 text-white shadow-sm' : 'bg-sky-200'}`}>{config.showBg && <CheckCircle2 className="w-3.5 h-3.5" />}</div><input type="checkbox" checked={config.showBg} onChange={e => setConfig({...config, showBg: e.target.checked})} className="hidden" /><span className="text-[13px] font-black text-blue-900">底色</span></label>
                      </div>
                      <div className="grid grid-cols-2 gap-1.5">
                        {Object.values(THEMES).map(t => (
                          <button key={t.id} onClick={() => setConfig({...config, theme: t.id})} className={`py-1.5 rounded-xl border-2 transition-all flex items-center justify-center gap-1 ${config.theme === t.id ? 'border-sky-400 bg-white text-blue-900 shadow-sm' : 'border-sky-100 text-blue-400'}`}><div className={`w-3 h-3 rounded-full ${t.bg}`}></div><span className="text-[11px] font-black whitespace-nowrap">{t.name.slice(0,2)}</span></button>
                        ))}
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div className="bg-white border-2 border-sky-100 p-3 rounded-[1.2rem] shadow-sm hover:shadow-md transition-all"><div className="flex items-center gap-1.5"><input type="file" accept="image/*" onChange={(e) => handleFileUpload(e, 'logo')} className="hidden" id="logo-upload" /><label htmlFor="logo-upload" className="flex-1 flex justify-center items-center gap-2 px-2 py-2 bg-sky-50 border-2 border-sky-200 rounded-xl cursor-pointer hover:bg-sky-100 transition-all text-[13px] font-bold text-blue-700"><ImageIcon className="w-4 h-4" /> {config.logo ? '已上傳' : '標誌'}</label>{config.logo && <button onClick={() => setConfig(p => ({ ...p, logo: null }))} className="p-1.5 text-rose-400 hover:text-rose-600 rounded-lg transition-all"><Trash2 className="w-4 h-4" /></button>}</div></div>
                      <div className="bg-white border-2 border-sky-100 p-3 rounded-[1.2rem] shadow-sm hover:shadow-md transition-all"><div className="flex items-center gap-1.5"><input type="file" accept="image/*" onChange={(e) => handleFileUpload(e, 'bgImage', 5)} className="hidden" id="bg-upload" /><label htmlFor="bg-upload" className="flex-1 flex justify-center items-center gap-2 px-2 py-2 bg-sky-50 border-2 border-sky-200 rounded-xl cursor-pointer hover:bg-sky-100 transition-all text-[13px] font-bold text-blue-700"><ImagePlus className="w-4 h-4" /> {config.bgImage ? '已上傳' : '背景'}</label>{config.bgImage && <button onClick={() => setConfig(p => ({ ...p, bgImage: null }))} className="p-1.5 text-rose-400 hover:text-rose-600 rounded-lg transition-all"><Trash2 className="w-4 h-4" /></button>}</div></div>
                    </div>
                  </div>
                </section>
              </div>
            </div>

            <div className="p-6 border-t-2 border-sky-100 bg-white/95 backdrop-blur-xl shrink-0 relative z-50">
              <div className="max-w-4xl mx-auto flex gap-4">
                {mode === 'single' ? (
                  <>
                    <button onClick={exportSinglePDF} disabled={isExporting || !libsLoaded} className="flex-[1.5] bg-sky-400 text-white py-3.5 rounded-[1.5rem] font-black flex items-center justify-center gap-2 hover:bg-sky-500 hover:shadow-lg hover:-translate-y-1 disabled:opacity-50 transition-all text-[18px]">{isExporting ? <Loader2 className="w-6 h-6 animate-spin" /> : <Download className="w-6 h-6" />} 下載 PDF</button>
                    <button onClick={async () => { const c = await generateCanvas('export-single'); const link = document.createElement('a'); link.download = `${singleData.name}.png`; link.href = c.toDataURL(); link.click(); }} className="flex-1 bg-sky-50 text-blue-700 border-2 border-sky-200 py-3.5 rounded-[1.5rem] font-black flex items-center justify-center gap-2 hover:border-sky-400 hover:bg-white transition-all text-[18px] hover:-translate-y-1">存成圖片</button>
                  </>
                ) : (
                  <>
                    <button onClick={exportBatchPDF} disabled={isExporting || batchList.length === 0} className="flex-[1.5] bg-sky-400 text-white py-3.5 rounded-[1.5rem] font-black flex items-center justify-center gap-2 hover:bg-sky-500 hover:shadow-lg hover:-translate-y-1 disabled:opacity-50 transition-all text-[18px]">{isExporting ? <Loader2 className="w-6 h-6 animate-spin" /> : <FileDown className="w-6 h-6" />} 匯出合併 PDF ({batchList.length})</button>
                    <button onClick={exportBatchZIP} disabled={isExporting || batchList.length === 0} className="flex-1 bg-sky-50 text-blue-700 border-2 border-sky-200 py-3.5 rounded-[1.5rem] font-black flex items-center justify-center gap-2 hover:border-sky-400 hover:bg-white transition-all text-[18px] hover:-translate-y-1">打包 ZIP</button>
                  </>
                )}
              </div>
            </div>
          </div>

          <div onMouseDown={startDrag} className="w-1.5 bg-sky-100 hover:bg-sky-300 cursor-col-resize z-30 flex flex-col items-center justify-center transition-colors shadow-inner shrink-0 group relative border-l border-sky-200"><div className="absolute inset-y-0 left-0 right-[-12px] z-40"></div><div className="h-16 w-1 bg-white rounded-full shadow-sm flex flex-col items-center justify-center gap-1 py-1"><div className="w-0.5 h-1 bg-sky-300 rounded-full"></div><div className="w-0.5 h-1 bg-sky-300 rounded-full"></div></div></div>

          <div style={{ width: `${100 - leftWidth}%` }} className="relative flex flex-col overflow-hidden bg-sky-50/60 bg-[radial-gradient(#bae6fd_2px,transparent_2px)] [background-size:24px_24px] shrink-0">
            <div className="absolute top-10 w-full px-6 flex justify-between items-center z-50 pointer-events-none">
              <div className="bg-white/90 backdrop-blur-xl px-5 py-2 rounded-full shadow-sm text-[12px] font-black text-blue-900 pointer-events-auto border-2 border-white flex items-center gap-3">
                <span className="w-2.5 h-2.5 rounded-full bg-green-400 animate-pulse shadow-[0_0_8px_rgba(74,222,128,0.4)]"></span>
                預覽 {Math.round(previewScale * 100)}%
              </div>
              
              {mode === 'batch' && batchList.length > 0 && (
                <div className="flex items-center gap-2 bg-white/90 backdrop-blur-xl px-4 py-2 rounded-2xl shadow-sm pointer-events-auto border-2 border-white">
                  <button onClick={() => setActivePreviewIndex(p => Math.max(0, p - 1))} disabled={activePreviewIndex === 0} className="w-8 h-8 flex items-center justify-center rounded-lg bg-sky-50 text-blue-700 disabled:opacity-40 transition-all font-bold text-lg cursor-pointer">‹</button>
                  <span className="text-[14px] font-black text-blue-900 min-w-[3.5rem] text-center">{activePreviewIndex + 1} / {batchList.length}</span>
                  <button onClick={() => setActivePreviewIndex(p => Math.min(batchList.length - 1, p + 1))} disabled={activePreviewIndex === batchList.length - 1} className="w-8 h-8 flex items-center justify-center rounded-lg bg-sky-50 text-blue-700 disabled:opacity-40 transition-all font-bold text-lg cursor-pointer">›</button>
                </div>
              )}
            </div>

            <div ref={previewWrapperRef} className="flex-1 w-full h-full overflow-hidden flex flex-col relative z-10 pointer-events-auto">
                <div className="m-auto shrink-0 flex justify-center items-center p-4 pt-16">
                    <div className="relative shrink-0 shadow-2xl transition-all duration-300" style={{ width: `${794 * previewScale}px`, height: `${1123 * previewScale}px` }}>
                        <div className="origin-top-left bg-white rounded-md overflow-hidden absolute top-0 left-0" style={{ width: '794px', height: '1123px', transform: `scale(${previewScale})` }}>
                            <NameTentTemplate id="preview-single" person={mode === 'single' ? singleData : (batchList[activePreviewIndex] || singleData)} config={config} />
                        </div>
                    </div>
                </div>
            </div>
          </div>

          <div style={{ position: 'fixed', top: '-20000px', left: '-20000px', width: '794px', height: '1123px', zIndex: -50, pointerEvents: 'none' }}>
            <div id="export-container">
              <NameTentTemplate id="export-single" person={singleData} config={config} />
              {mode === 'batch' && batchList.map(p => <NameTentTemplate key={p.id} id={`batch-item-${p.id}`} person={p} config={config} />)}
            </div>
          </div>

          {notification && (
            <div className="fixed bottom-10 right-10 z-50 animate-fade-in-up">
              <div className={`px-7 py-4 rounded-[1.5rem] shadow-xl flex items-center gap-3 text-white font-black border-2 ${notification.type === 'error' ? 'bg-rose-500 border-rose-400' : 'bg-blue-600 border-blue-400'}`}><span className="text-[15px]">{notification.msg}</span></div>
            </div>
          )}

          {isExporting && (
            <div className="fixed inset-0 bg-white/70 backdrop-blur-md z-[100] flex flex-col items-center justify-center animate-fade-in-up">
              <div className="bg-white p-12 rounded-[3rem] shadow-2xl flex flex-col items-center text-center max-w-sm border-4 border-sky-100">
                <Loader2 className="w-14 h-14 text-sky-500 animate-spin mb-4" />
                <h2 className="text-2xl font-black text-blue-950 mb-2">努力輸出中...</h2>
                <p className="text-sm text-blue-700 font-bold">請稍候，正為您繪製高畫質桌牌 ☁️</p>
              </div>
            </div>
          )}
        </div>
      );
    }
    
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
